name: 📦 Build qualcommax-wrt-25.12.x

on:
  workflow_dispatch:
    inputs:
      wrt_version:
        description: "选择OpenWrt/Immortalwrt"
        required: true
        default: "immortalwrt"
        type: choice
        options:
          - 'immortalwrt'
          - 'openwrt'
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.5"
        type: choice
        options:
          - '25.12.0'
          - '25.12.1'
          - '25.12.2'
          - '25.12.3'
          - '25.12.4'
          - '25.12.5'
      profile:
        type: choice
        description: |
          输入 软路由型号 可选值如下：
        options:
          - aliyun_ap8220
          - arcadyan_aw1000
          - asus_rt-ax89x
          - buffalo_wxr-5950ax12
          - cmcc_rm2-6
          - compex_wpq873
          - asus_rt-ax89x
          - dynalink_dl-wrx36
          - edgecore_eap102
          - bedimax_cax1800
          - linksys_homewrk
          - linksys_mx4200v1
          - linksys_mx4200v2
          - linksys_mx4300
          - linksys_mx5300
          - linksys_mx8500
          - netgear_rax120v2
          - netgear_sxr80
          - netgear_wax218
          - netgear_wax620
          - netgear_wax630
          - prpl_haze
          - qnap_301w
          - redmi_ax6
          - spectrum_sax1v1k
          - tplink_deco-x80-5g
          - tplink_eap620hd-v1
          - tplink_eap660hd-v1
          - xiaomi_ax3600
          - xiaomi_ax9000
          - yuncore_ax880
          - zbtlink_zbt-z800ax
          - zte_mf269                 
          - zyxel_nbg7815
          - zyxel_nwa210ax         
        required: true
        default: 'qnap_301w'
      ipaddr:
        description: "请设置软路由的管理地址(注意仅对多网口软路由有效) 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "192.168.10.1"
      rootfs_partsize:
        description: '设置软件包大小 单位(MB)'
        required: true
        default: '256'
        type: choice
        options:
          - '256'
          - '512'
          - '1024'
          - '2048'          
      include_docker:
        description: "是否集成 Docker 插件"
        required: true
        default: "no"
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  # 判断：如果选了 immortalwrt，且版本不是 25.12.0（包含25.12.1~5），就强制降级为 25.12.0；否则保持用户选择
  FINAL_LUCI_VER: ${{ (inputs.wrt_version == 'immortalwrt' && inputs.luci_version != '25.12.0') && '25.12.0' || inputs.luci_version }}
  #FINAL_LUCI_VER: ${{ (inputs.wrt_version == 'immortalwrt' && inputs.luci_version != '25.12.0' && inputs.luci_version != '25.12.1') && '25.12.1' || inputs.luci_version }}
  FINAL_WRT: ${{ inputs.wrt_version }}
  DOCKER: ${{ inputs.include_docker }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ 设置可执行权限
        run: |
          chmod +x qualcommax/build25.sh
          chmod +x qualcommax/openwrt_repositories
          chmod +x qualcommax/immortalwrt_repositories
          chmod +x shell/prepare-packages.sh
          chmod +x shell/openwrt-custom-packages.sh
          chmod +x shell/immortalwrt-custom-packages.sh

      - name: 🛠️ 安装依赖
        run: |      
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zstd curl unzip tree qemu-utils genisoimage

      - name: ⚙️ Set custom IP config
        run: |
          sed -i "s/版本号/${{ env.FINAL_LUCI_VER }}/g" files/etc/uci-defaults/99-custom.sh
          sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" files/etc/uci-defaults/99-custom.sh
          sed -i "s/VERXXXX/${{ env.FINAL_LUCI_VER }}/g" files/etc/uci-defaults/99-custom.sh
          echo "✅ 配置修改完成"

      - name: ⏬ 下载 Wrt ImageBuilder 25.12.x
        run: |
          URL="https://downloads.${{ env.FINAL_WRT }}.org/releases/${{ env.FINAL_LUCI_VER }}/targets/qualcommax/ipq807x/${{ env.FINAL_WRT }}-imagebuilder-${{ env.FINAL_LUCI_VER }}-qualcommax-ipq807x.Linux-x86_64.tar.zst"
          curl -Lf -o imagebuilder.tar.zst "$URL"
          tar --use-compress-program=unzstd -xvf imagebuilder.tar.zst
          mv -- ${{ env.FINAL_WRT }}-imagebuilder-* imagebuilder

      - name: 🔄 复制必备文件
        run: |   
          cp qualcommax/build25.sh imagebuilder/
          
          if [ "${{ env.FINAL_WRT }}" = "openwrt" ]; then
            cp qualcommax/openwrt_repositories imagebuilder/repositories
            cat shell/openwrt-custom-packages.sh >> imagebuilder/apk-custom-packages.sh
          else
            cp qualcommax/immortalwrt_repositories imagebuilder/repositories
            cat shell/immortalwrt-custom-packages.sh >> imagebuilder/apk-custom-packages.sh
          fi
          
          cp shell/prepare-packages.sh imagebuilder/
          mkdir -p imagebuilder/files/etc/uci-defaults imagebuilder/files/etc/apk/repositories.d
          cp files/etc/uci-defaults/99-custom.sh imagebuilder/files/etc/uci-defaults/
          cat files/customfeeds/25.customfeeds.list >> imagebuilder/files/etc/apk/repositories.d/customfeeds.list
          echo "✅ 文件准备完成"

      - name: ⚙️ 动态获取 Kmod 哈希并更新配置
        run: |         
          BASE_URL="https://downloads.${{ env.FINAL_WRT }}.org/releases/${{ env.FINAL_LUCI_VER }}/targets/qualcommax/ipq807x/kmods/"          
          echo "正在从 $BASE_URL 获取最新的内核哈希..."
          KMOD_DIR=$(curl -sL $BASE_URL | grep -oE "[0-9.-]+-[a-f0-9]{32}" | head -n 1)
          if [ -n "$KMOD_DIR" ]; then
            FULL_KMOD_URL="${BASE_URL}${KMOD_DIR}/packages.adb"
            echo "✅ 成功匹配 kmods 路径: $FULL_KMOD_URL"
            sed -i "s|VERSION_PLACEHOLDER|${{ env.FINAL_LUCI_VER }}|g" imagebuilder/repositories
            sed -i "s|KMOD_PLACEHOLDER|${FULL_KMOD_URL}|g" imagebuilder/repositories
          else
            echo "❌ 无法获取 Kmod 哈希"
            exit 1
          fi
          cat imagebuilder/repositories

      - name: 🧱 构建 WRT 25.12.x 固件
        working-directory: ./imagebuilder
        env:
          INCLUDE_DOCKER: ${{ inputs.include_docker }}
          ROOTFS_PARTSIZE: ${{ inputs.rootfs_partsize }}
        run: |
          bash ./build25.sh "${{ inputs.profile }}" "${{ inputs.rootfs_partsize }}"

      - name: 📜 生成发布说明
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器后台信息
          📌 版本： ${{ env.FINAL_WRT }}-${{ env.FINAL_LUCI_VER }}
          🏠 后台地址： ${{ inputs.ipaddr }}
          👤 用户名： root
          🔑 密码： 无
          🐳 Docker状态： ${{ inputs.include_docker == 'yes' && '已集成' || '未集成' }}
          EOF

      - name: 🚀 上传到 Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ env.FINAL_WRT }}-${{ env.FINAL_LUCI_VER }}-qualcommax-ipq807x-RELEASE-Docker-${{ inputs.include_docker }}
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            imagebuilder/bin/targets/qualcommax/ipq807x/*squashfs-sysupgrade.*
            imagebuilder/bin/targets/qualcommax/ipq807x/*squashfs-factory.*
          token: ${{ secrets.GITHUB_TOKEN }}
